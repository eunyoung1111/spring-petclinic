#02.petclinic/petclinic-deployment.yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: petclinic
  namespace: petclinic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: petclinic
  template:
    metadata:
      labels:
        app: petclinic
    spec:
      containers:
        - name: petclinic
          image: eunyoung/petclinic:latest
          ports:
            - containerPort: 8080
